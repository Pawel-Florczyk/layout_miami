<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBiKE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
  <nav class="nav">
    <img class="nav__logo" src="MyBiKE.svg" alt="logo">
    <div class="nav-block">
      <img class="nav-block__phone" src="Phone.svg" alt="phone">
      <img class="nav-block__menu" src="Navigation.svg" alt="menu">
    </div>
  </nav>
  <h1 class="title">
    Take the Streets
  </h1>
  </header>
  <main class="main">
    <h2 class="title title--secondary">
      Move <span class="title__glow">Free</span>
    </h2>

    <p class="main-text">
      Shift your ride, not gears. Find the fastest way to move in the city as the bike adapts intuitively to power the speed you need.
    </p>

    <section class="section">
      <h2 class="title title--section">
        Compare bikes
      </h2>
    </section>

    <section class="section">
      <h2 class="title title--section">
        The details
      </h2>
    </section>

    <section class="section">
      <h2 class="title title--section">
        Contact us
      </h2>
    </section>
  </main>
</body>
</html>
